<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <meta name="description" content="Contact Digi-dex">

    <title>Contacts | Digi-dex</title>
    <link rel="icon" href="./assets/images/favicon.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

<header class="banner">
    <img class="banner-image" src="./assets/images/hero-banner-img.png">
</header>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">Digi-dex</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="detail.html">Detail</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contacts.html">Contact</a></li>

            </ul>

        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="card">
        <div class="card-body">

            <h2 class="mb-4">Contact Us</h2>

            <form id="contactForm">

                <input class="form-control mb-2" id="name" placeholder="Name" required>
                <input class="form-control mb-2" id="email" placeholder="Email" required>
                <input class="form-control mb-2" id="subject" placeholder="Subject" required>
                <textarea class="form-control mb-3" id="message" rows="5" placeholder="Message" required></textarea>

                <button class="btn btn-primary w-100">Send Message</button>

            </form>

            <div id="successMsg" class="alert alert-success mt-3 d-none">
                Message sent successfully!
            </div>

            <div class="text-center mt-3">
                <a href="index.html" class="btn btn-outline-secondary">
                    ← Back to Home
                </a>
            </div>

        </div>
    </div>

</div>

<script src="./assets/js/contact.js"></script>
<script src="./assets/js/nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
