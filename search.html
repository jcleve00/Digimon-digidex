<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <meta name="description" content="Search Digimon in the Digi-dex">
    <link rel="icon" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <div class="glitter-bg"></div>

    <!-- Header -->
    <header class="banner">
        <div class="banner-content">
            <img class="banner-image" src="./assets/images/hero-banner-img.png" alt="Digimon Banner">
        </div>
    </header>

    <!-- Nav -->
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Digi-dex</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="browse.html">Browse</a></li>
                    <li class="nav-item"><a class="nav-link active" href="search.html">Search</a></li>
                    <li class="nav-item"><a class="nav-link" href="summon.html">Summon</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- SEARCH -->
    <div id="search" style="margin-top:20px;">
        <input type="text" id="searchInput" placeholder="Enter Digimon name">
        <button onclick="searchDigimon()">Search</button>
    </div>

    <!-- DIGIVICE -->
    <div id="digivice-div">
        <img id="digivice-img" src="./assets/images/digivice.png" alt="Digivice">
        <div id="back-button"><div>Back</div></div>
        <div id="digivice-screen">
            <img id="digi-detail-image">
        </div>
        <div id="next-button"><div>Next</div></div>
        <div id="prev-button"><div>Prev</div></div>
    </div>

    <!-- RESULT -->
    <div id="result"></div>

    <!-- JS-->
    <script src="./assets/js/detailScript.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
